<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница в разработке</title>
    <link rel="stylesheet" href="/style/style.css">
</head>

<body>
    <div class="wrapper">
        <div class="block">
            <h1 class="block__head">
                Страница не доступна!

            <p class="block__text">
                Приносим свои извинения, данная страница находится в разработке. Но вы также можете вернуться обратно
                страницу.

            <div class="block__box">
                <button id="btn-return" class="block__box-btnOnMainPage">
                    Вернуться
                </button>
            </div>
        </div>
    </div>

    <script src="script/script.js"></script>
